name: Scaffold CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    name: Shell helpers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Syntax check
        run: bash -n bootstrap/*.sh

      - name: Shellcheck
        run: shellcheck --severity=warning -x bootstrap/*.sh

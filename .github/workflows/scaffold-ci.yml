name: Scaffold CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    name: Shell helpers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Syntax check
        run: find bin lib/knot checks/doctor tests -name '*.sh' -print0 | xargs -0 bash -n

      - name: Shellcheck
        run: find bin lib/knot checks/doctor tests -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning -x

      - name: Scaffold doctor
        run: bash bin/knot-doctor.sh --scaffold-only --strict-docs
